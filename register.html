<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour Activation | Create Your Creator Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #F5C24C;
            --dark-gold: #D4A017;
            --success-green: #4ADE80;
            --bg: #0e0e0e;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
        }

        .luxury-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0e0e0e 100%);
            z-index: -1;
        }

        .gold-text {
            background: linear-gradient(135deg, #fff5c0, var(--gold), var(--dark-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            letter-spacing: 4px;
            padding: 20px;
            text-align: center;
        }

        .register-card {
            width: 95%;
            max-width: 500px;
            margin: 20px auto 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(245, 194, 76, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 600;
        }

        .input-container { position: relative; width: 100%; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(245, 194, 76, 0.1);
            border-radius: 12px;
            color: white;
            transition: 0.3s;
            appearance: none;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(245, 194, 76, 0.5);
        }

        .btn-gold {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .summary-box {
            background: rgba(245, 194, 76, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 1px dashed rgba(245, 194, 76, 0.3);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .notification-toast {
            position: fixed;
            bottom: 30px;
            left: -450px; 
            width: 90%;
            max-width: 350px;
            background: rgba(15, 15, 15, 0.98);
            border-left: 4px solid var(--gold);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 0 15px 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 9999;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .notification-toast.active { left: 0; }
        .name-highlight { color: var(--gold); font-weight: 600; }
        .amount-highlight { color: var(--success-green); font-weight: 600; }
        option { background: #1a1a1a; color: white; }
    </style>
</head>
<body>

<div class="luxury-bg"></div>
<div class="nav-logo gold-text">GLAMOUR</div>

<div class="register-card">
    <div id="step-1">
        <h2 class="text-3xl font-bold text-center mb-2" style="font-family: 'Cinzel', serif;">Join Glamour</h2>
        <p class="text-gray-400 text-center text-sm mb-8">Start earning in Euros & Pounds today.</p>

        <form id="glamour-reg-form" class="space-y-4">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-user" placeholder="glamour_creator" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="contact@example.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number (Include Country Code)</label>
                <input type="tel" id="reg-phone" placeholder="e.g. +234 90..." required>
            </div>

            <div class="form-group">
                <label>Residence (Country)</label>
                <div class="input-container">
                    <select id="reg-location" required style="color: gray;" onchange="this.style.color='white'">
                        <option value="" disabled selected>Choose your location</option>
                        <optgroup label="Africa">
                            <option value="Nigeria">Nigeria</option>
                            <option value="Ghana">Ghana</option>
                            <option value="South Africa">South Africa</option>
                            <option value="Kenya">Kenya</option>
                            <option value="Egypt">Egypt</option>
                            <option value="Ethiopia">Ethiopia</option>
                            <option value="Tanzania">Tanzania</option>
                            <option value="Uganda">Uganda</option>
                            <option value="Algeria">Algeria</option>
                            <option value="Morocco">Morocco</option>
                            <option value="Angola">Angola</option>
                            <option value="Ivory Coast">Ivory Coast</option>
                            <option value="Cameroon">Cameroon</option>
                            <option value="Senegal">Senegal</option>
                            <option value="Zimbabwe">Zimbabwe</option>
                            <option value="Zambia">Zambia</option>
                            <option value="Other Africa">Other African Country</option>
                        </optgroup>
                        <optgroup label="Europe">
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Germany">Germany</option>
                            <option value="France">France</option>
                            <option value="Italy">Italy</option>
                            <option value="Spain">Spain</option>
                            <option value="Netherlands">Netherlands</option>
                            <option value="Belgium">Belgium</option>
                            <option value="Sweden">Sweden</option>
                            <option value="Switzerland">Switzerland</option>
                            <option value="Austria">Austria</option>
                            <option value="Norway">Norway</option>
                            <option value="Denmark">Denmark</option>
                            <option value="Finland">Finland</option>
                            <option value="Ireland">Ireland</option>
                            <option value="Portugal">Portugal</option>
                            <option value="Poland">Poland</option>
                            <option value="Other Europe">Other European Country</option>
                        </optgroup>
                        <optgroup label="Other Regions">
                            <option value="United States">United States</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                            <option value="Other">Other</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <input type="password" id="reg-pass" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('reg-pass', this)"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-container">
                    <input type="password" id="reg-confirm" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('reg-confirm', this)"></i>
                </div>
            </div>

            <button type="submit" class="btn-gold mt-4">Create Account</button>
        </form>
    </div>

    <div id="step-2" class="hidden">
        <h2 class="text-2xl font-bold text-center mb-2 gold-text" style="font-family: 'Cinzel', serif;">Verify Details</h2>
        <div class="summary-box">
            <div class="summary-row"><span>Name:</span> <span id="sum-name">...</span></div>
            <div class="summary-row"><span>Username:</span> <span id="sum-user">...</span></div>
            <div class="summary-row"><span>Phone:</span> <span id="sum-phone">...</span></div>
            <div class="summary-row"><span>Location:</span> <span id="sum-loc">...</span></div>
            <div class="summary-row" style="border:none; margin-top:10px;">
                <span class="font-bold text-white">System Status:</span>
                <span class="font-bold text-xl gold-text">READY</span>
            </div>
        </div>
        <button id="firebase-trigger" class="btn-gold">Confirm & Enter Dashboard</button>
        <button onclick="location.reload()" class="w-full text-gray-500 text-xs mt-4 underline">Edit Info</button>
    </div>
</div>

<div id="toast" class="notification-toast">
    <div class="bg-blue-500/10 p-2 rounded-full">
        <i class="fas fa-user-circle text-blue-400 text-lg"></i>
    </div>
    <div>
        <div class="flex justify-between items-center gap-4">
            <div class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">Real-time Activity</div>
            <div id="toast-time" class="text-[9px] text-gold-500 font-medium" style="color: var(--gold);">Just now</div>
        </div>
        <div id="toast-msg" class="text-xs text-white leading-tight"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyMQQK0qbw1lpeuPcPmFgSpBoy1yFKFJE",
        authDomain: "celeste-website.firebaseapp.com",
        projectId: "celeste-website",
        storageBucket: "celeste-website.firebasestorage.app",
        messagingSenderId: "181088900219",
        appId: "1:181088900219:web:eb1fedd04dc0cf676b7ede"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let formData = {};

    window.togglePass = function(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    document.getElementById('glamour-reg-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const p1 = document.getElementById('reg-pass').value;
        const p2 = document.getElementById('reg-confirm').value;
        if(p1 !== p2) { alert("Passwords do not match!"); return; }

        // Clean and store username
        const username = document.getElementById('reg-user').value.toLowerCase().replace(/\s/g, '');

        formData = {
            fullName: document.getElementById('reg-name').value,
            username: username,
            email: document.getElementById('reg-email').value,
            phone: document.getElementById('reg-phone').value,
            country: document.getElementById('reg-location').value,
            password: p1,
            balance: 0,
            indirectEarnings: 0,
            isActivated: false,
            createdAt: new Date().toISOString()
        };

        document.getElementById('sum-name').innerText = formData.fullName;
        document.getElementById('sum-user').innerText = "@" + formData.username;
        document.getElementById('sum-phone').innerText = formData.phone;
        document.getElementById('sum-loc').innerText = formData.country;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    });

    document.getElementById('firebase-trigger').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.innerText = "Syncing Profile...";

        try {
            // Save to Firebase
            await setDoc(doc(db, "users", formData.username), formData);
            
            // Sync username for dashboard display
            localStorage.setItem('glamour_username', formData.username);
            
            // Redirect
            window.location.href = "dashboard.html";
        } catch (error) {
            console.error(error);
            alert("Error: Connection failed.");
            btn.disabled = false;
        }
    });
</script>

<script>
    // Activity Ticker Logic
    const nigeriaNames = ["Chinonso", "Adebayo", "Ifeoma", "Olawale", "Blessing", "Tunde", "Chukwudi", "Amina", "Efe", "Zainab", "Emmanuel", "Precious", "Ruth", "Ndifreke"];
    const euroNames = ["Maximilian", "Chloe", "Alessandro", "Sophie", "Lucas", "Elena", "Matteo", "Isabella", "Hans", "Clara", "James", "Andrew", "Christopher", "Abigail", "Evelyn"];
    const locations = [{name: "Lagos, Nigeria", isEuro: false}, {name: "London, UK", isEuro: true}, {name: "Abuja, Nigeria", isEuro: false}, {name: "Berlin, Germany", isEuro: true}, {name: "Port Harcourt, Nigeria", isEuro: false}, {name: "Paris, France", isEuro: true}, {name: "Enugu, Nigeria", isEuro: false}, {name: "Madrid, Spain", isEuro: true}];

    function showToast() {
        const toast = document.getElementById('toast');
        const msg = document.getElementById('toast-msg');
        const timeDisplay = document.getElementById('toast-time');
        const loc = locations[Math.floor(Math.random() * locations.length)];
        const user = loc.isEuro ? euroNames[Math.floor(Math.random() * euroNames.length)] : nigeriaNames[Math.floor(Math.random() * nigeriaNames.length)];
        const isRegister = Math.random() > 0.5;
        let amtString = isRegister ? (loc.isEuro ? "€7" : "₦14,000") : (loc.isEuro ? "€" + (Math.floor(Math.random() * 50) + 10) : "₦" + ((Math.floor(Math.random() * 45) + 5) * 2000).toLocaleString());
        msg.innerHTML = `<span class="name-highlight">${user}</span> from ${loc.name} just <span class="text-white">${isRegister ? 'registered' : 'withdrew'}</span> <span class="amount-highlight">${amtString}</span>`;
        timeDisplay.innerText = "Just now";
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 5000);
        setTimeout(showToast, 15000); 
    }
    setTimeout(showToast, 4000);
</script>
</body>
</html>
